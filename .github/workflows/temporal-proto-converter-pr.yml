name: temporal-proto-converter | Validate PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'temporal-proto-converter/**'
      - '!temporal-proto-converter/composer.lock'

jobs:
  validate-version:
    runs-on: arc-runner-set
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get current and latest versions
        id: versions
        run: |
          CURRENT=$(python3 -c "import json; print(json.load(open('${{ github.workspace }}/temporal-proto-converter/composer.json'))['version'])")
          echo "Current version: $CURRENT"
          if [ -z "$CURRENT" ]; then
            echo "::error::Failed to read version from composer.json"
            exit 1
          fi

          LATEST=$(git tag --list 'temporal-proto-converter-*' --sort=-v:refname | head -n1 | sed 's|temporal-proto-converter-||')
          : "${LATEST:=0.0.0}"
          echo "Latest tag: $LATEST"

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Validate version bump
        run: |
          CURRENT="${{ steps.versions.outputs.current }}"
          LATEST="${{ steps.versions.outputs.latest }}"

          version_gt() {
            [ "$(printf '%s\n' "$@" | sort -V | head -n 1)" != "$1" ]
          }

          if version_gt "$LATEST" "$CURRENT" || [ "$LATEST" = "$CURRENT" ]; then
            echo "::error:: version ($CURRENT) must be greater than latest tag ($LATEST)"
            exit 1
          fi

          echo "✅ version bump valid: $CURRENT > $LATEST"

  validate-composer:
    runs-on: arc-runner-set
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Composer
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}/temporal-proto-converter:/app" \
            -w /app \
            php:8.4-cli \
            sh -c "curl -sS https://getcomposer.org/installer | php && mv composer.phar /usr/local/bin/composer && chmod +x /usr/local/bin/composer && composer validate --no-check-publish"
