name: temporal-proto-converter | Release

on:
  push:
    branches: [main]
    paths:
      - 'temporal-proto-converter/**'
      - '!temporal-proto-converter/composer.lock'

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch tags
        run: git fetch --tags origin

      - name: Check and create tag
        run: |
          VERSION=$(cat "$GITHUB_WORKSPACE/temporal-proto-converter/version" | tr -d '[:space:]')
          TAG="temporal-proto-converter-$VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "❌ Tag $TAG already exists — bump the version in temporal-proto-converter/version"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release temporal-proto-converter $VERSION"
          git push origin "$TAG"
          echo "✅ Created tag $TAG"
